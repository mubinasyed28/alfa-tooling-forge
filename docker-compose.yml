
services:
  mongo:
    image: mongo:7
    container_name: alfa-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - alfa_mongo_data:/data/db
    environment:
      # No auth for local dev — matches MONGODB_URI in .env
      MONGO_INITDB_DATABASE: alfatooling

volumes:
  alfa_mongo_data:
